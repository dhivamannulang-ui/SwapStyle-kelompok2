<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwapStyle – Daftar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="extra.css" />
</head>
<body>

  <!-- ===== NAVBAR (ringkas) ===== -->
  <nav class="navbar">
    <div class="logo-area">
      <img src="img/logo.png" alt="SwapStyle Logo" class="logo-img" />
      <div>
        <span class="logo-text">SwapStyle</span>
        <span class="logo-sub">Sustainable Fashion for Students</span>
      </div>
    </div>
    <div class="nav-right">
      <a class="btn-outline" href="login.html">Masuk</a>
    </div>
  </nav>

  <!-- ===== DAFTAR (dari tplDaftar) ===== -->
  <section class="auth-page">
    <div class="auth-card">
      <p class="modal-title" style="font-size:1.6rem;">Buat Akun</p>
      <p class="modal-sub">Gabung dan mulai jual-beli fashion preloved dengan aman.</p>

      <form class="auth-form" id="formDaftar">
        <div class="form-field">
          <label>Daftar Sebagai</label>
          <div class="choice-group role-choice" data-role-group>
            <span class="choice-chip active" data-val="pembeli">🛍️ Pembeli</span>
            <span class="choice-chip" data-val="penjual">🏪 Penjual</span>
          </div>
        </div>
        <div class="form-field">
          <label for="dName">Nama Lengkap</label>
          <input id="dName" type="text" placeholder="Nama kamu" required />
        </div>
        <div class="form-field">
          <label for="dEmail">Email Kampus</label>
          <input id="dEmail" type="email" placeholder="nama@kampus.ac.id" required />
        </div>
        <div class="form-field">
          <label for="dPass">Kata Sandi</label>
          <input id="dPass" type="password" placeholder="Minimal 8 karakter" minlength="8" required />
        </div>
        <button type="submit" class="btn-primary">Daftar Sekarang</button>
      </form>

      <p class="auth-switch">Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
    </div>
  </section>

</body>
</html>
