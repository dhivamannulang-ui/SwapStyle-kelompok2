<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwapStyle – Keranjang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="extra.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="logo-area">
      <img src="img/logo.png" alt="SwapStyle Logo" class="logo-img" />
      <div>
        <span class="logo-text">SwapStyle</span>
        <span class="logo-sub">Sustainable Fashion for Students</span>
      </div>
    </div>
    <div class="nav-right">
      <a class="icon-btn" href="orders.html">📦</a>
      <a class="icon-btn" href="cart.html">🛒</a>
      <a class="btn-primary" href="login.html">Masuk</a>
    </div>
  </nav>

  <!-- ===== KERANJANG (dari tplCart) ===== -->
  <section class="section" style="padding-bottom:0;">
    <div class="section-header">
      <h2 class="section-title">Keranjang (2)</h2>
    </div>
  </section>

  <div class="cart-page-layout">
    <div class="cart-list">

      <div class="cart-item">
        <div class="cart-item-photo"><img src="img/Kemeja Oxford.jpg" alt="Kemeja Oxford" /></div>
        <div class="cart-item-info">
          <p class="cart-item-name">Kemeja Oxford</p>
          <p class="cart-item-meta">Ukuran M · <span class="cart-item-price">Rp 75.000</span></p>
          <div class="qty-control">
            <button class="qty-btn">−</button>
            <span class="qty-val">1</span>
            <button class="qty-btn">+</button>
            <span class="cart-item-remove">Hapus</span>
          </div>
        </div>
      </div>

      <div class="cart-item">
        <div class="cart-item-photo"><img src="img/Jeans SlimFit.jpg" alt="Jeans Slim Fit" /></div>
        <div class="cart-item-info">
          <p class="cart-item-name">Jeans Slim Fit</p>
          <p class="cart-item-meta">Ukuran M · <span class="cart-item-price">Rp 110.000</span></p>
          <div class="qty-control">
            <button class="qty-btn">−</button>
            <span class="qty-val">1</span>
            <button class="qty-btn">+</button>
            <span class="cart-item-remove">Hapus</span>
          </div>
        </div>
      </div>

      <!-- Kondisi kosong (referensi, sembunyikan salah satu saat desain) -->
      <!-- <p class="cart-empty">Keranjang kamu masih kosong. Yuk mulai belanja!</p> -->

    </div>

    <aside class="cart-summary-box">
      <h3>Ringkasan</h3>
      <div class="pay-summary" style="margin-bottom:16px;">
        <div class="pay-summary-row"><span>Total</span><span>Rp 185.000</span></div>
      </div>
      <a href="payment.html" class="btn-primary" style="width:100%;">Checkout Sekarang</a>
    </aside>
  </div>

</body>
</html>
