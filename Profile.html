<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwapStyle – Profil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="extra.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="logo-area">
      <img src="img/logo.png" alt="SwapStyle Logo" class="logo-img" />
      <div>
        <span class="logo-text">SwapStyle</span>
        <span class="logo-sub">Sustainable Fashion for Students</span>
      </div>
    </div>
    <div class="nav-right">
      <a class="icon-btn" href="orders.html">📦</a>
      <a class="icon-btn" href="cart.html">🛒</a>
      <button class="btn-logout">Keluar</button>
    </div>
  </nav>

  <!-- ===== PROFIL (halaman baru, belum ada di app asli — di app asli hanya user-chip di navbar) ===== -->
  <section class="section">

    <div class="profile-header">
      <div class="seller-avatar">SF</div>
      <div>
        <p class="profile-name">Sari F. <span class="badge-verified">✓</span></p>
        <p class="seller-meta">⭐ 4.9 · 124 terjual · 18 item aktif</p>
      </div>
      <a href="dashboard.html" class="btn-primary">Dashboard Penjual</a>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active">Info Akun</button>
      <button class="filter-tab">Alamat</button>
      <button class="filter-tab">Keamanan</button>
    </div>

    <div class="profile-form-card">
      <h3>Informasi Akun</h3>
      <form>
        <div class="form-field">
          <label for="pfNama">Nama Lengkap</label>
          <input type="text" id="pfNama" value="Sari Fitriani" />
        </div>
        <div class="form-field">
          <label for="pfEmail">Email</label>
          <input type="email" id="pfEmail" value="sari.f@kampus.ac.id" />
        </div>
        <div class="form-field">
          <label for="pfHp">No. HP</label>
          <input type="tel" id="pfHp" value="0812xxxxxxx" />
        </div>
        <div class="form-field">
          <label for="pfBio">Bio Toko</label>
          <textarea id="pfBio" rows="3">Menjual pakaian preloved berkualitas, kondisi terjaga rapi.</textarea>
        </div>
        <button type="submit" class="btn-primary" style="width:100%;">Simpan Perubahan</button>
      </form>
    </div>

  </section>

</body>
</html>
